<script>
// Build albums structure from raw song list at runtime.
// Album metadata: year + tag (studio / live / split / misc).
const ALBUM_META = {
  "被禁忌的游戏":            { year: 2004, tag: "STUDIO · 录音室" },
  "梵高先生":                { year: 2005, tag: "STUDIO · 录音室" },
  "这个世界会好吗":          { year: 2007, tag: "STUDIO · 录音室" },
  "我爱南京":                { year: 2009, tag: "LIVE · 现场" },
  "二零零九年十月十六日事件": { year: 2009, tag: "LIVE · 现场" },
  "工体东路没有人":          { year: 2010, tag: "LIVE · 现场" },
  "我们也爱南京":            { year: 2010, tag: "LIVE · 现场" },
  "在每一条伤心的应天大街上": { year: 2010, tag: "STUDIO · 录音室" },
  "你好,郑州":               { year: 2011, tag: "LIVE · 现场" },
  "你好郑州":                { year: 2011, tag: "LIVE · 现场" },
  "Imagine-2011":           { year: 2011, tag: "LIVE · 现场" },
  "F":                      { year: 2012, tag: "STUDIO · 录音室" },
  "108个关键词":             { year: 2012, tag: "LIVE · 现场" },
  "1701":                   { year: 2013, tag: "LIVE · 现场" },
  "勾三搭四":                { year: 2014, tag: "UNPLUGGED · 不插电" },
  "io":                     { year: 2014, tag: "LIVE · 现场" },
  "看见":                    { year: 2014, tag: "COMP · 合辑" },
  "动静":                    { year: 2015, tag: "STUDIO · 录音室" },
  "广场合集":                { year: 2015, tag: "COMP · 合辑" },
  "家":                      { year: 2016, tag: "STUDIO · 录音室" },
  "8":                      { year: 2016, tag: "CHILDREN · 儿歌" },
  "电声与管弦乐":            { year: 2017, tag: "ORCHESTRAL · 管弦" },
  "电声与管弦乐II":           { year: 2017, tag: "LIVE · 现场" },
  "北京不插电":              { year: 2018, tag: "UNPLUGGED · 不插电" },
};

(function buildAlbums() {
  const groups = new Map();
  for (const s of window.__LIZHI_RAW) {
    // strip "专辑-" prefix from artist field; that's the album key
    const key = (s.artist || "零碎").replace(/^专辑-/, "");
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push({ name: s.name, url: s.url, cover: s.cover });
  }
  const albums = [];
  for (const [name, tracks] of groups) {
    const meta = ALBUM_META[name] || { year: "—", tag: "MISC · 零碎" };
    albums.push({
      name,
      year: meta.year,
      tag: meta.tag,
      cover: tracks[0]?.cover || "",
      tracks: tracks.map(t => ({ ...t, cover: t.cover || tracks[0]?.cover })),
    });
  }
  // sort by year then name; unknowns last
  albums.sort((a, b) => {
    const ay = typeof a.year === "number" ? a.year : 9999;
    const by = typeof b.year === "number" ? b.year : 9999;
    if (ay !== by) return ay - by;
    return a.name.localeCompare(b.name, "zh");
  });
  window.__LIZHI_ALBUMS = albums;
})();
</script>
